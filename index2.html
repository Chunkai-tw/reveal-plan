        // Fisher-Yates Shuffle 洗牌演算法 (隨機打亂)
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex > 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

            // 觸發淡出動畫
            flashcard.classList.remove('fade-in');
            flashcard.classList.add('fade-out');

            // 等待淡出後更新內容並淡入
            setTimeout(() => {
                if (currentState === 0) {
                    // 第 1 層：題號 + 題目 (字體放大)
                    badge.innerText = "第 1 層：題目";
                    badge.className = "absolute top-4 left-4 bg-blue-100 text-blue-700 text-sm md:text-base font-bold px-3 py-1 rounded-full shadow-sm";
                    contentDiv.innerHTML = `<h2 class="text-4xl md:text-5xl font-extrabold text-gray-800 leading-tight px-4">${card.title}</h2>`;
                } else if (currentState === 1) {
                    // 第 2 層：記憶口訣 (字體放大，僅顯示括號內容)
                    badge.innerText = "第 2 層：記憶口訣";
                    badge.className = "absolute top-4 left-4 bg-orange-100 text-orange-600 text-sm md:text-base font-bold px-3 py-1 rounded-full shadow-sm";
                    contentDiv.innerHTML = `<h2 class="text-5xl md:text-7xl font-black text-orange-600 tracking-widest drop-shadow-md">${card.mnemonic}</h2>`;
                } else if (currentState === 2) {
                    // 第 3 層：細節與重點 (完整呈現文件內容)
                    badge.innerText = "第 3 層：關鍵字與重點";
                    badge.className = "absolute top-4 left-4 bg-green-100 text-green-700 text-sm md:text-base font-bold px-3 py-1 rounded-full shadow-sm";
                    
                    // 將換行符號 \n 拆分成段落，忠於原始資料呈現
                    const detailsList = card.details.split('\n').map(item => 
                        `<li class="mb-4 text-left text-lg md:text-xl font-medium text-gray-700 leading-relaxed">${item}</li>`
                    ).join('');
                    
                    contentDiv.innerHTML = `<ul class="w-full px-4 md:px-10 list-none">${detailsList}</ul>`;
                }

                // 更新進度條
                document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${cards.length}`;
                document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / cards.length) * 100}%`;

                // 觸發淡入動畫
                flashcard.classList.remove('fade-out');
                flashcard.classList.add('fade-in');
            }, 150);
        }

        function nextState() {
            if (currentState < 2) {
                currentState++;
                updateUI();
            } else {
                nextCard();
            }
        }

        function nextCard() {
            if (currentIndex < cards.length - 1) {
                currentIndex++;
                currentState = 0;
                updateUI();
            } else {
                // 完成全部
                const contentDiv = document.getElementById('card-content');
                document.getElementById('layer-badge').style.display = 'none';
                contentDiv.innerHTML = `
                    <div class="text-center">
                        <div class="text-6xl mb-4">🎉</div>
                        <h2 class="text-3xl md:text-5xl font-extrabold text-orange-600 mb-4">恭喜完成所有卡片！</h2>
                        <p class="text-xl text-gray-600 mb-8">您已經複習完本輪所有重點。</p>
                        <button onclick="location.reload()" class="bg-orange-500 text-white font-bold py-3 px-8 rounded-full shadow-lg hover:bg-orange-600 transition-all text-xl">
                            重新開始測驗
                        </button>
                    </div>`;
            }
        }

        function prevCard() {
            if (currentState > 0) {
                // 如果在第2層或第3層，先退回上一層
                currentState--;
                updateUI();
            } else if (currentIndex > 0) {
                // 如果在第1層，退回上一題的第3層
                currentIndex--;
                currentState = 2;
                updateUI();
            }
        }

        // 鍵盤操作支援
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter' || e.code === 'ArrowRight') {
                e.preventDefault();
                nextState();
            } else if (e.code === 'ArrowLeft') {
                e.preventDefault();
                prevCard();
            }
        });

        // 啟動應用程式
        window.onload = init;
    </script>
</body>
</html>
